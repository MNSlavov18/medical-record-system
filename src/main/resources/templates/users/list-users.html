<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Users</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">
    <h1>Users</h1>

    <div th:if="${param.created}" class="success-message">
        User was created successfully.
    </div>

    <div th:if="${param.updated}" class="success-message">
        User was updated successfully.
    </div>

    <div th:if="${param.deleted}" class="success-message">
        User was deleted successfully.
    </div>

    <div th:if="${errorMessage}" class="error-message">
        <span th:text="${errorMessage}"></span>
    </div>

    <div class="page-actions">
        <a href="/users/add" class="btn btn-primary">Add User</a>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Email</th>
            <th>Role</th>
            <th>Assigned To</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="user : ${users}">
            <td th:text="${user.id}"></td>
            <td th:text="${user.username}"></td>
            <td th:text="${user.email}"></td>
            <td th:text="${user.roleName}"></td>

            <td>
                <span th:if="${user.assigned}"
                      th:text="${user.assignedType + ': ' + user.assignedName}">
                </span>

                <span th:unless="${user.assigned}">
                    Not assigned
                </span>
            </td>

            <td>
                <a th:href="@{/users/edit/{id}(id=${user.id})}"
                   class="btn btn-secondary">
                    Edit
                </a>

                <form th:action="@{/users/delete/{id}(id=${user.id})}"
                      method="post"
                      style="display:inline;"
                      th:if="${!user.assigned and user.username != 'admin'}"
                      onsubmit="return confirm('Are you sure you want to delete this user?');">
                    <button type="submit" class="btn btn-danger">
                        Delete
                    </button>
                </form>

                <button th:if="${user.assigned or user.username == 'admin'}"
                        class="btn btn-disabled"
                        disabled>
                    Delete
                </button>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
