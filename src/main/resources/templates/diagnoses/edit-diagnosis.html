<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Diagnosis</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">
    <h1>Edit Diagnosis</h1>

    <div class="error" th:if="${formError}" th:text="${formError}"></div>

    <form th:action="@{/diagnoses/edit/{id}(id=${diagnosisId})}" th:object="${diagnosis}" method="post">
        <div class="form-group">
            <label for="code">Code</label>
            <input id="code" type="text" th:field="*{code}">
            <div class="error" th:if="${#fields.hasErrors('code')}" th:errors="*{code}"></div>
        </div>

        <div class="form-group">
            <label for="name">Name</label>
            <input id="name" type="text" th:field="*{name}">
            <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" rows="4" th:field="*{description}"></textarea>
            <div class="error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
        </div>

        <button class="btn btn-primary" type="submit">Update</button>
        <a class="btn btn-secondary" href="/diagnoses">Cancel</a>
    </form>
</div>

</body>
</html>
